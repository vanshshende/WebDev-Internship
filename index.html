<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🚀 My Creative Webpage</h1>
        <p class="subtitle">Learning Web Development in Style</p>

        <div class="card">
            <h2>👨‍💻 About Me</h2>
            <p>I am exploring HTML, CSS & JavaScript and building cool projects!</p>
        </div>

        <div class="card">
            <h2>🖼️ Image</h2>
            <img src="https://tse3.mm.bing.net/th/id/OIP.kUSWyi3WZ8bQpuRM57w2VwHaEK?pid=Api&P=0&h=220" alt="WebDev">
        </div>

        <div class="card">
            <h2>🔗 Useful Link</h2>
            <a href="https://www.google.com" target="_blank">Visit Google</a>
        </div>

        <div class="card">
            <h2>⚡ Try Interaction</h2>
            <button onclick="showMessage()">Click Me</button>
        </div>
    </div>

    <!-- Custom Alert Box -->
    <div id="popup" class="popup">
        <p>🎉 Button Clicked Successfully!</p>
        <button onclick="closePopup()">Close</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
